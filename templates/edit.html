{% extends "base.html" %}

{% block title %}编辑 {{ member.name }} - 温馨家庭记事本{% endblock %}

{% block content %}
<section class="form-section">
    <h2 class="section-title">
        <span class="title-icon">✏️</span>
        编辑家人信息
    </h2>

    <form class="member-form" action="{{ url_for('edit_member', member_id=member.id) }}" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="name">姓名 <span class="required">*</span></label>
                <input type="text" id="name" name="name" required value="{{ member.name }}">
            </div>

            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" name="nickname" value="{{ member.nickname or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="solar_birthday">阳历生日</label>
                <input type="date" id="solar_birthday" name="solar_birthday" value="{{ member.solar_birthday }}">
            </div>

            <div class="form-group">
                <label for="lunar_birthday">阴历生日</label>
                <input type="text" id="lunar_birthday" name="lunar_birthday" value="{{ member.lunar_birthday or '' }}" placeholder="如：正月初一">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="favorite_foods">喜欢的食物</label>
                <textarea id="favorite_foods" name="favorite_foods" rows="2">{{ member.favorite_foods or '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="favorite_sports">喜欢的运动</label>
                <textarea id="favorite_sports" name="favorite_sports" rows="2">{{ member.favorite_sports or '' }}</textarea>
            </div>
        </div>

        <div class="form-group">
            <label for="disliked_foods">讨厌的食物 / 忌口</label>
            <textarea id="disliked_foods" name="disliked_foods" rows="2">{{ member.disliked_foods or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="daily_notes">日常注意事项</label>
            <textarea id="daily_notes" name="daily_notes" rows="3">{{ member.daily_notes or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="remarks">备注</label>
            <textarea id="remarks" name="remarks" rows="2">{{ member.remarks or '' }}</textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('member_detail', member_id=member.id) }}" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary">💾 保存修改</button>
        </div>
    </form>
</section>
{% endblock %}
