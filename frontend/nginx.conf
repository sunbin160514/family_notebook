server {
    listen 80;
    server_name localhost;

    # 静态资源尾部斜杠重定向到无斜杠
    location ~* ^/family_notebook/assets/(.+)/$ {
        return 301 /family_notebook/assets/$1;
    }

    # 静态资源
    location ~* ^/family_notebook/assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # family_notebook 项目路径
    location /family_notebook/ {
        root /usr/share/nginx/html;
        try_files $uri /family_notebook/index.html;
    }

    # API反向代理到后端 (保留 /api/ 以便向后兼容)
    location /api/ {
        proxy_pass http://app:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 新路径 API 反向代理
    location /family_notebook/api/ {
        proxy_pass http://app:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        proxy_pass http://app:5000/health;
        access_log off;
    }

    # 默认跳转到 family_notebook
    location = / {
        return 301 /family_notebook/;
    }
}
