version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: family_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Test11223344@
      MYSQL_DATABASE: family_notebook
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./init_data.sql:/docker-entrypoint-initdb.d/02-data.sql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pTest11223344@"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    container_name: family_notebook
    # 不对外暴露端口，只通过前端Nginx访问
    expose:
      - "5000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=family_notebook
      - DB_USER=root
      - DB_PASSWORD=Test11223344@
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
      # 允许前端域名跨域（生产环境）
      - FRONTEND_URL=http://localhost
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: family_frontend
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - app
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
