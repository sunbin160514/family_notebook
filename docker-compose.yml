# 家庭记事本 - Docker Compose配置
version: '3.8'

services:
  app:
    build: .
    container_name: family_notebook
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-family_notebook}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - family_network

networks:
  family_network:
    driver: bridge
